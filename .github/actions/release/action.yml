name: Release
description: Publish the package to npm via OIDC trusted publishing
runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
    - name: Set node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
        registry-url: https://registry.npmjs.org/
    - name: Update npm (OIDC trusted publishing requires npm >= 11.5.1)
      shell: bash
      run: npm install -g npm@latest
    - name: Install
      shell: bash
      run: pnpm install --frozen-lockfile
    - name: Test
      shell: bash
      run: pnpm run test
    - name: Publish to NPM
      shell: bash
      run: npm publish --provenance
